<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none" role="img" aria-label="SVY">
  <rect width="192" height="192" fill="white"/>
  <g transform="translate(96 96) scale(2.0) translate(-32 -32)">
    <!-- White sticker border -->
    <rect width="64" height="64" rx="14" fill="white"/>
    <!-- Sky-blue plate -->
    <rect x="3" y="3" width="58" height="58" rx="11" fill="#4dc3ee"/>
    <!-- Open book: top page arcs -->
    <path d="M9 27 C12 14 24 12 32 19 C40 12 52 14 55 27" stroke="#1e3a5f" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Open book: bottom spine arc -->
    <path d="M9 49 C16 57 26 56 32 51 C38 56 48 57 55 49" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center spine -->
    <line x1="32" y1="19" x2="32" y2="51" stroke="#1e3a5f" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Page rule lines -->
    <path d="M13 37 C19 39 25 39 31 37M33 37 C39 39 45 39 51 37" stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
    <!-- SVY monogram -->
    <text x="32" y="44" text-anchor="middle" font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif" font-weight="900" font-size="17" letter-spacing="1" fill="#1e3a5f">SVY</text>
  </g>
</svg>
